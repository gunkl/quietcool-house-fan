esphome:
  name: house-fan
  friendly_name: house fan

  libraries:
    - SPI
    - mfurga/CC1101

esp32:
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: DEBUG

external_components:
  source: ./components

fan:
  - platform: quietcool_house_fan
    name: QuietCool Whole House Fan
    clk_pin: 18
    mosi_pin: 6
    miso_pin: 16
    cs_pin: 4
    gdo0_pin: 3
    gdo2_pin: 15
    remote_id: [ 0x2d, 0xd4, 0x06, 0xcb, 0x00, 0xd5, 0x12 ]
