globals:
  - id: remote_id
    type: 'uint8_t[4]'
    restore_value: true

####################################################################################################
# Change these values to your remote's ID. If you don't know your ID, open up the ESPHome
# logger and push any button on your remote (if you just wake up your remote it should 
# send the command "0x66" which is the wakeup command). In the logs you'll see something 
# like this entry:
#
# [15:59:14.560][D][quietcool-fan:060]: Remote command received: 0x66
# [15:59:14.560][D][quietcool-fan:061]:          from remote ID: [0xcb, 0x00, 0xa0, 0xcf]
#
# Copy the values inside the square brackets and paste them here (note the logs have square
# brackets and this needs curly). 
#
# Note that you should be able to put your fan in pairing mode and then tell ESPHome to turn
# it on which should make it learn whatever default code is here. You should be able to but
# I haven't tested it because my fan is hard to get to.
####################################################################################################
    initial_value: '{0xcb, 0x00, 0xd5, 0x12}'


  - id: autoset_remote
    type: bool
    restore_value: true

####################################################################################################
# If you can't view the logs or don't want to, you can have this module learn the remote ID
# when it starts up. To do that, set this value to "true" and then shortly after your ESP
# boots, press a button on your remote (or just wake it). The ESP will then retain that ID
# as long as it has power (it should try to retain it after a power outage, but it's not
# a guarantee and I'm not sure what will happen during software updates).
####################################################################################################
    initial_value: 'false'

  # -- Remote-receive support (Issue #1) -----------------------------------------------------
  # Tracks the last command WE transmitted (via the send_command script below) and when, so a
  # received packet that merely echoes our own transmission is not misread as a remote button
  # press. See the on_packet handler and docs/remote-capture-protocol.md.
  - id: last_sent_command
    type: uint8_t
    restore_value: false
    initial_value: '0'
  - id: last_sent_command_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'

  # -- Field state (Issue #1) -----------------------------------------------------------------
  # The remote is a periodic-status BEACON, not a burst-per-press transmitter: after any single
  # interaction it re-broadcasts its full current status (power, speed, and timer, in rotation)
  # for several seconds, so the same byte can legitimately repeat many times a second or so
  # apart even though the user pressed nothing new. A received byte is therefore a *reported
  # value* for one of these three independent fields, not itself an event.
  #
  # Each global below holds the last-ACCEPTED (held) value for one field, as its raw command
  # byte -- the byte already fully identifies the value within its field (the power/speed/timer
  # byte-spaces are disjoint), so no separate enum/translation layer is needed. An HA event
  # fires only when a newly-decoded field's reported value differs from its held value (an
  # edge/transition); a heartbeat re-announcing an unchanged value is silently absorbed no
  # matter how long it repeats. See the on_packet handler below and
  # docs/remote-capture-protocol.md. `0x00` is a safe "never observed" sentinel for all three --
  # no real byte in any of the three families is `0x00`.
  - id: power_state
    type: uint8_t
    restore_value: false
    initial_value: '0'
  - id: speed_state
    type: uint8_t
    restore_value: false
    initial_value: '0'
  - id: timer_state
    type: uint8_t
    restore_value: false
    initial_value: '0'

####################################################################################################
# Set these pin numbers to the ESP32 pins corresponding to how you wired up your CC1101
# chip. If you used the default SPI pins you might only need to set the two in the cc1101
# section, but it doesn't hurt to be explicit.
####################################################################################################
spi:
  clk_pin: 18
  mosi_pin: 6
  miso_pin: 16

cc1101:
  cs_pin: 4
  gdo0_pin: 3

####################################################################################################
# CC1101 chips might not have perfect center frequencies. If yours doesn't work out when you start
# off, try setting this parameter up or down to dial it in. Several users on the Home Assistant
# community have reported that the default didn't work for them and they had to change this value.
# The lines commented out are frequencies verified to work by other testers so start with those. 
####################################################################################################
  frequency: 433.92MHz
#  frequency: 433.94MHz
#  frequency: 433.96MHz

####################################################################################################
# You shouldn't need to change anything below this line. See the README if you want details
# on how the protocol works.
####################################################################################################
  modulation_type: 2-FSK
  symbol_rate: 2400
  fsk_deviation: 10kHz
  packet_mode: True
  packet_length: 0
  sync_mode: 16/16
  sync0: 0xd4
  sync1: 0x2d
  num_preamble: 4
  on_packet:
    then:
      - lambda: |-
          // ==== Remote-receive support (Issue #1) =========================================
          // ONTOLOGY -- read this before touching this handler:
          // The remote is a periodic-status BEACON, not a burst-per-press transmitter. After
          // any single interaction it re-broadcasts its full current status (power, speed,
          // timer -- in rotation) for several seconds. A received byte is a *reported value*
          // for one of those three fields; it is NOT itself a press event. The only thing that
          // should ever reach Home Assistant is a *change*: a field's newly-reported value
          // differing from what we last held for that field. Do NOT reintroduce a time-window
          // debounce here -- a real heartbeat re-announcement several seconds later is
          // indistinguishable from "a new press of the same value" under any fixed time window;
          // only comparing against the held per-field value gets this right. See
          // docs/remote-capture-protocol.md for how this was discovered.

          static const uint32_t SELF_ECHO_WINDOW_MS = 500;  // tune after running the capture protocol

          uint32_t now_ms = millis();
          uint8_t cmd = x[4];

          bool id_match = (x[0] == id(remote_id)[0] && x[1] == id(remote_id)[1] &&
                           x[2] == id(remote_id)[2] && x[3] == id(remote_id)[3]);

          // Known command bytes, for logging only (does not gate field decode below).
          const char *name = "UNKNOWN";
          if (cmd == 0x66) name = "KNOWN(wake)";
          else if (cmd == 0x80) name = "KNOWN(power=off)";
          else if (cmd == 0xbf) name = "KNOWN(power=on)";
          else if (cmd == 0x1f) name = "KNOWN(speed=low)";
          else if (cmd == 0x2f) name = "KNOWN(speed=medium, untested)";
          else if (cmd == 0x3f) name = "KNOWN(speed=high)";
          else if (cmd == 0x91) name = "KNOWN(timer=1h)";
          else if (cmd == 0x92) name = "KNOWN(timer=2h)";
          else if (cmd == 0x94) name = "KNOWN(timer=4h)";
          else if (cmd == 0x98) name = "KNOWN(timer=8h)";
          else if (cmd == 0x9c) name = "KNOWN(timer=12h)";
          else if (cmd == 0x9f) name = "KNOWN(timer=none)";

          ESP_LOGD("quietcool-fan", "Remote command received: 0x%02x [%s] id_match=%s",
                   cmd, name, id_match ? "yes" : "no");
          ESP_LOGD("quietcool-fan", "         from remote ID: [0x%02x, 0x%02x, 0x%02x, 0x%02x]",
                   x[0], x[1], x[2], x[3]);

          if (id(autoset_remote)) {
            memcpy(id(remote_id), x.data(), 4);
            id(autoset_remote) = false;
          }

          // ==== HA event decode (Issue #1, only for packets from our paired remote/fan) ====
          if (!id_match) return;

          // Self-echo guard: ignore a received packet that is just hearing our own transmit
          // (send_command below stamps last_sent_command/_ms right before sending). This is
          // UNRELATED to the field/heartbeat model above -- it only protects against hearing
          // our own just-sent command, never against the remote's own repeats.
          uint32_t since_last_tx_ms = now_ms - id(last_sent_command_ms);
          if (id(last_sent_command_ms) != 0 && cmd == id(last_sent_command) && since_last_tx_ms < SELF_ECHO_WINDOW_MS) {
            ESP_LOGD("quietcool-fan", "Suppressed as self-echo (cmd 0x%02x sent %u ms ago)", cmd, since_last_tx_ms);
            return;
          }

          // ---- POWER field ----------------------------------------------------------------
          if (cmd == 0xbf || cmd == 0x80) {
            if (cmd != id(power_state)) {
              id(power_state) = cmd;
              id(quietcool_remote_event).trigger(cmd == 0xbf ? "on" : "off");
            }
            return;
          }

          // ---- SPEED field ------------------------------------------------------------------
          if (cmd == 0x1f || cmd == 0x2f || cmd == 0x3f) {
            if (cmd != id(speed_state)) {
              id(speed_state) = cmd;
              std::string token = (cmd == 0x1f) ? "low" : (cmd == 0x2f) ? "medium" : "high";
              id(quietcool_remote_event).trigger(token);
            }
            return;
          }

          // ---- TIMER field ------------------------------------------------------------------
          if (cmd == 0x91 || cmd == 0x92 || cmd == 0x94 || cmd == 0x98 || cmd == 0x9c || cmd == 0x9f) {
            if (cmd != id(timer_state)) {
              id(timer_state) = cmd;
              std::string token;
              if (cmd == 0x91) token = "timer_1h";
              else if (cmd == 0x92) token = "timer_2h";
              else if (cmd == 0x94) token = "timer_4h";
              else if (cmd == 0x98) token = "timer_8h";
              else if (cmd == 0x9c) token = "timer_12h";
              // 0x9f ("no timer") has no HA token of its own -- it isn't a duration to hold,
              // it's the absence of one. Held state above still updates so a later real timer
              // press correctly detects the transition back into a duration.
              if (!token.empty()) {
                id(quietcool_remote_event).trigger(token);
              }
            }
            return;
          }

          // Anything else (0x50, 0x8c, 0xb0, 0xde, 0x43, ...) is remote status chatter that
          // doesn't belong to a known field -- intentionally not decoded (see
          // docs/remote-capture-protocol.md "de-prioritized" section). Already logged above.

script:
  - id: send_command
    mode: queued
    parameters:
      command: int
    then:
      - lambda: |-
          // Stamp what we're about to send (Issue #1 self-echo guard, see on_packet above).
          id(last_sent_command) = (uint8_t) command;
          id(last_sent_command_ms) = millis();
      - cc1101.send_packet:
          data: !lambda |-
            std::vector<uint8_t> packet(id(remote_id), id(remote_id)+4);
            packet.push_back(command);
            packet.push_back(command);
            return packet;
      - delay: 70ms
      - cc1101.send_packet:
          data: !lambda |-
            std::vector<uint8_t> packet(id(remote_id), id(remote_id)+4);
            packet.push_back(command);
            packet.push_back(command);
            return packet;
      - delay: 70ms
      - cc1101.send_packet:
          data: !lambda |-
            std::vector<uint8_t> packet(id(remote_id), id(remote_id)+4);
            packet.push_back(command);
            packet.push_back(command);
            return packet;
      - logger.log:
          format: "Sent command 0x%02x from ID [0x%02x, 0x%02x, 0x%02x, 0x%02x]"
          args:
            - command
            - id(remote_id)[0]
            - id(remote_id)[1]
            - id(remote_id)[2]
            - id(remote_id)[3]

fan:
  - platform: template
    name: "quietcool whole house fan"
    id: house_fan
    speed_count: 2
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - script.execute:
          id: send_command
          command: 0xbf
      - lambda: !lambda 'id(house_fan).speed = 2;'
    on_turn_off: 
      - script.execute:
          id: send_command
          command: 0x80
      - lambda: !lambda 'id(house_fan).speed = 0;'
    on_speed_set:
      - if:
          condition:
            lambda: !lambda 'return x == 0;'
          then:
            - script.execute:
                id: send_command
                command: 0x80
      - if:
          condition:
            lambda: !lambda 'return x == 1;'
          then:
            - script.execute:
                id: send_command
                command: 0x1f
      - if:
          condition:
            lambda: !lambda 'return x == 2;'
          then:
            - script.execute:
                id: send_command
                command: 0x3f

####################################################################################################
# Remote-receive support (Issue #1): exposes decoded remote button presses to Home Assistant.
# The on_packet handler above fires this event with one of the event_types below only when a
# field's reported value changes from what was previously held (edge-triggered) -- the remote
# re-announces its full status every few seconds after any interaction, and those repeats are
# intentionally absorbed, not fired again. "medium" speed is untested (this fan is 2-speed) but
# documented as if it functioned, per project decision -- see docs/remote-capture-protocol.md.
####################################################################################################
event:
  - platform: template
    name: "QuietCool Remote"
    id: quietcool_remote_event
    device_class: button
    event_types:
      - "on"
      - "off"
      - "low"
      - "medium"
      - "high"
      - "timer_1h"
      - "timer_2h"
      - "timer_4h"
      - "timer_8h"
      - "timer_12h"

